<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MX TV — Canales Nacionales</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0d;
  --bg2:#161616;
  --bg3:#1f1f1f;
  --border:rgba(255,255,255,.07);
  --accent:#e8372a;
  --accent2:#ff6b5b;
  --text:#f0f0f0;
  --text2:#888;
  --green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(13,13,13,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;
}
.logo{
  font-family:'Oswald',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:3px;
  color:var(--accent);
  white-space:nowrap;
  cursor:pointer;
}
.logo span{color:var(--text)}
.search-wrap{flex:1;position:relative}
.search-wrap input{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:9px 14px 9px 38px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  color:var(--text2);font-size:14px;
  pointer-events:none;
}

/* MAIN */
main{padding:70px 16px 24px}

/* STATUS BAR */
#status-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;
  font-size:12px;color:var(--text2);
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text2);
  flex-shrink:0;
}
.dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.dot.ok{background:var(--green)}
.dot.error{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CATEGORY TABS */
.cat-tabs{
  display:flex;gap:6px;
  overflow-x:auto;scrollbar-width:none;
  margin-bottom:18px;
  padding-bottom:2px;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--text2);
  padding:6px 14px;
  border-radius:4px;
  font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
  font-family:'DM Sans',sans-serif;
}
.cat-tab.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.cat-tab:hover:not(.active){border-color:rgba(232,55,42,.4);color:var(--text)}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}
.ch-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 10px;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
  text-align:center;
  transition:all .15s;
  position:relative;
  overflow:hidden;
}
.ch-card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,55,42,.06),transparent);
  opacity:0;
  transition:opacity .2s;
}
.ch-card:hover{border-color:rgba(232,55,42,.5);transform:translateY(-2px)}
.ch-card:hover::before{opacity:1}
.ch-logo{
  width:52px;height:52px;
  object-fit:contain;
  border-radius:6px;
}
.ch-placeholder{
  width:52px;height:52px;
  border-radius:6px;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.ch-name{
  font-size:11px;font-weight:500;
  line-height:1.3;color:var(--text);
}
.ch-cat{
  font-size:10px;
  color:var(--accent2);
  background:rgba(232,55,42,.1);
  padding:2px 7px;border-radius:3px;
}

/* EMPTY */
#empty{
  display:none;
  text-align:center;
  padding:60px 20px;
  color:var(--text2);
}
#empty .ico{font-size:40px;margin-bottom:12px}
#empty p{font-size:14px}

/* PLAYER OVERLAY */
#player-overlay{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.95);
  flex-direction:column;
}
#player-overlay.show{display:flex}

#player-top{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#player-back{
  background:none;
  border:1px solid var(--border);
  color:var(--text2);
  padding:7px 12px;border-radius:5px;
  font-size:13px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
#player-back:hover{border-color:var(--accent);color:var(--text)}
#player-name{
  font-family:'Oswald',sans-serif;
  font-size:18px;letter-spacing:1px;
  flex:1;
}
.live-badge{
  background:var(--accent);
  color:#fff;font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:3px;
  letter-spacing:1px;
}

#video-wrap{
  flex:1;
  background:#000;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
video{width:100%;height:100%;display:block;object-fit:contain}

#vid-error{
  display:none;
  position:absolute;inset:0;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  background:#000;
  text-align:center;padding:24px;
}
#vid-error.show{display:flex}
#vid-error .ico{font-size:36px}
#vid-error p{color:var(--text2);font-size:13px}
.retry-btn{
  background:var(--accent);
  color:#fff;border:none;
  padding:10px 22px;border-radius:5px;
  font-size:13px;font-weight:600;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
}

#player-info{
  padding:14px 16px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
#player-info-cat{font-size:12px;color:var(--text2)}

/* LOADER */
#loader{
  display:none;
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
#loader.show{display:flex}
.spinner{
  width:32px;height:32px;
  border:2px solid var(--bg3);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-text{color:var(--text2);font-size:13px}
</style>
</head>
<body>

<div id="loader" class="show">
  <div class="spinner"></div>
  <span id="loader-text">Cargando canales MX...</span>
</div>

<nav>
  <div class="logo" onclick="resetView()">MX<span>TV</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Buscar canal..." oninput="onSearch(this.value)"/>
  </div>
</nav>

<main>
  <div id="status-bar">
    <div class="dot loading" id="status-dot"></div>
    <span id="status-text">Cargando...</span>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div id="grid"></div>
  <div id="empty">
    <div class="ico">📺</div>
    <p>No se encontraron canales</p>
  </div>
</main>

<div id="player-overlay">
  <div id="player-top">
    <button id="player-back" onclick="closePlayer()">← Volver</button>
    <div id="player-name"></div>
    <span class="live-badge">EN VIVO</span>
  </div>
  <div id="video-wrap">
    <video id="video" controls autoplay playsinline></video>
    <div id="vid-error">
      <div class="ico">⚠️</div>
      <p>No se pudo cargar el stream.<br/>El canal puede estar fuera de línea.</p>
      <button class="retry-btn" onclick="retry()">🔄 Reintentar</button>
    </div>
  </div>
  <div id="player-info">
    <div id="player-info-cat"></div>
  </div>
</div>

let allChannels = [];
let filtered = [];
let currentCat = 'Todos';
let currentCh = null;
let hlsInstance = null;
let searchTimer = null;

// ── PARSE M3U ──────────────────────────────────────────
function parseM3U(text) {
  const lines = text.split('\n');
  const channels = [];
  let current = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      current = { name: '', logo: '', group: '', url: '' };
      // name: last part after comma
      const comma = line.lastIndexOf(',');
      current.name = comma >= 0 ? line.slice(comma + 1).trim() : 'Sin nombre';
      // logo
      const logoM = line.match(/tvg-logo="([^"]*)"/);
      if (logoM) current.logo = logoM[1];
      // group
      const groupM = line.match(/group-title="([^"]*)"/);
      if (groupM) current.group = groupM[1];
    } else if (line && !line.startsWith('#') && current) {
      current.url = line;
      channels.push(current);
      current = null;
    }
  }
  return channels;
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  setStatus('loading', 'Cargando playlist MX...');
  try {
    const text = M3U_RAW;
    allChannels = parseM3U(text);
    if (allChannels.length === 0) throw new Error('Sin canales');
    setStatus('ok', allChannels.length + ' canales disponibles');
    buildCatTabs();
    renderGrid(allChannels);
  } catch (e) {
    setStatus('error', 'Error cargando canales');
    document.getElementById('empty').style.display = 'block';
  }
  document.getElementById('loader').classList.remove('show');
}

// ── CATEGORÍAS ────────────────────────────────────────
function buildCatTabs() {
  const groups = ['Todos', ...new Set(allChannels.map(c => c.group || 'General').filter(Boolean))].slice(0, 12);
  document.getElementById('cat-tabs').innerHTML = groups.map((g, i) =>
    `<button class="cat-tab${i === 0 ? ' active' : ''}" onclick="selectCat(this,'${g.replace(/'/g, "\\'")}')">${g}</button>`
  ).join('');
}

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  const list = cat === 'Todos' ? allChannels : allChannels.filter(c => (c.group || 'General') === cat);
  renderGrid(list);
  document.getElementById('search-input').value = '';
}

// ── RENDER ────────────────────────────────────────────
function renderGrid(channels) {
  const empty = document.getElementById('empty');
  const grid = document.getElementById('grid');
  if (channels.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = channels.map((ch, i) => {
    const logo = ch.logo
      ? `<img class="ch-logo" src="${ch.logo}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy" alt=""/><div class="ch-placeholder" style="display:none">📺</div>`
      : `<div class="ch-placeholder">📺</div>`;
    const cat = ch.group ? `<div class="ch-cat">${ch.group}</div>` : '';
    return `<div class="ch-card" onclick="playChannel(${i})">
      ${logo}
      <div class="ch-name">${ch.name}</div>
      ${cat}
    </div>`;
  }).join('');
  // guardar índices globales del filtro actual
  filtered = channels;
}

// ── BÚSQUEDA ──────────────────────────────────────────
function onSearch(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) {
    selectCat(document.querySelector('.cat-tab'), 'Todos');
    return;
  }
  searchTimer = setTimeout(() => {
    const ql = q.toLowerCase();
    const results = allChannels.filter(c => c.name.toLowerCase().includes(ql));
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    renderGrid(results);
  }, 300);
}

function resetView() {
  document.getElementById('search-input').value = '';
  const first = document.querySelector('.cat-tab');
  if (first) selectCat(first, 'Todos');
}

// ── PLAYER ────────────────────────────────────────────
function playChannel(idx) {
  const ch = filtered[idx];
  if (!ch) return;
  currentCh = ch;
  document.getElementById('player-name').textContent = ch.name;
  document.getElementById('player-info-cat').textContent = ch.group || '';
  document.getElementById('vid-error').classList.remove('show');
  document.getElementById('player-overlay').classList.add('show');
  loadStream(ch.url);
}

function loadStream(url) {
  const video = document.getElementById('video');
  document.getElementById('vid-error').classList.remove('show');
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  video.src = '';

  if (window.Hls && Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: false, lowLatencyMode: true });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) showVidError(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  } else {
    video.src = url;
  }
  video.onerror = showVidError;
  video.play().catch(() => {});
}

function showVidError() {
  document.getElementById('vid-error').classList.add('show');
}

function retry() {
  if (currentCh) loadStream(currentCh.url);
}

function closePlayer() {
  const video = document.getElementById('video');
  video.pause(); video.src = '';
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  document.getElementById('vid-error').classList.remove('show');
  document.getElementById('player-overlay').classList.remove('show');
}

// ── STATUS ────────────────────────────────────────────
function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'dot ' + type;
  document.getElementById('status-text').textContent = text;
}

init();
</script>
